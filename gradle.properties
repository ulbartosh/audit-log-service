# Point Gradle's toolchain detection at the Homebrew openjdk@21 install on this
# machine. Without it, Gradle's default scan misses keg-only Homebrew JDKs.
org.gradle.java.installations.paths=/opt/homebrew/opt/openjdk@21/libexec/openjdk.jdk/Contents/Home

# Refuse to download a JDK if the toolchain spec is not satisfied locally.
org.gradle.java.installations.auto-download=false
