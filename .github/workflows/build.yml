name: build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  formatting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Spotless check
        run: ./gradlew --no-daemon spotlessCheck

  unit-tests:
    runs-on: ubuntu-latest
    needs: formatting
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew --no-daemon test

      - name: Upload unit test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            build/reports/tests/test/
            build/test-results/test/
          if-no-files-found: ignore

      - name: Upload unit test JaCoCo exec
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-exec-test
          path: build/jacoco/test.exec
          if-no-files-found: ignore

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Integration tests
        run: ./gradlew --no-daemon integrationTest

      - name: Upload integration test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: |
            build/reports/tests/integrationTest/
            build/test-results/integrationTest/
          if-no-files-found: ignore

      - name: Upload integration test JaCoCo exec
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-exec-integrationTest
          path: build/jacoco/integrationTest.exec
          if-no-files-found: ignore

  coverage:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download unit test JaCoCo exec
        uses: actions/download-artifact@v4
        with:
          name: jacoco-exec-test
          path: build/jacoco

      - name: Download integration test JaCoCo exec
        uses: actions/download-artifact@v4
        with:
          name: jacoco-exec-integrationTest
          path: build/jacoco

      - name: Coverage report and gate (>= 90% line)
        run: ./gradlew --no-daemon jacocoTestReport jacocoTestCoverageVerification -x test -x integrationTest

      - name: Coverage summary
        if: always()
        run: |
          REPORT=build/reports/jacoco/test/jacocoTestReport.xml
          if [ ! -f "$REPORT" ]; then
            echo "No JaCoCo report at $REPORT" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python3 - "$REPORT" >> "$GITHUB_STEP_SUMMARY" <<'PY'
          import sys, xml.etree.ElementTree as ET
          tree = ET.parse(sys.argv[1])
          PREFIX = 'com/training/bartosh/auditlog/'

          def metric(node, ctype):
              c = next((c for c in node.findall('counter') if c.get('type') == ctype), None)
              if c is None:
                  return (0, 0, None)
              missed, covered = int(c.get('missed')), int(c.get('covered'))
              total = missed + covered
              pct = (100.0 * covered / total) if total else None
              return (covered, total, pct)

          def cell(c, t, pct):
              if pct is None:
                  return 'n/a'
              return f'{c}/{t} ({pct:.1f}%)'

          print('## Coverage')
          print()
          print('Gate: line coverage must be >= 90% (excludes `AuditLogApplication` and `config/`).')
          print()
          print('| Package | Lines | Branches | Methods |')
          print('| --- | --- | --- | --- |')
          for pkg in tree.iter('package'):
              name = pkg.get('name').removeprefix(PREFIX) or '(root)'
              line = metric(pkg, 'LINE')
              branch = metric(pkg, 'BRANCH')
              method = metric(pkg, 'METHOD')
              print(f'| `{name}` | {cell(*line)} | {cell(*branch)} | {cell(*method)} |')
          root = tree.getroot()
          line = metric(root, 'LINE')
          branch = metric(root, 'BRANCH')
          method = metric(root, 'METHOD')
          print(f'| **TOTAL** | **{cell(*line)}** | **{cell(*branch)}** | **{cell(*method)}** |')
          PY

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/
          if-no-files-found: ignore

  package:
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble artifact
        run: ./gradlew --no-daemon assemble

      - name: Upload package reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: package-reports
          path: |
            build/reports/
            build/libs/
          if-no-files-found: ignore
